<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="stylesheet.css">
    <title>WonderTree | Shopping Cart</title>
</head>
<body>
  <!--Logo, Search bar, and Redirect-->
  <header class="navbar">
    <a href="index.html">
      <img src="images/placeholder file.gif" width="50px" alt="WonderTree Logo">
    </a>
    <!--Search container, Div contains submission icon. CSS Magnifying Icon-->
    <form class="search-container" id="search-container">
      <input type="search" class="search-bar" id="search-input" placeholder="Search products...">
      <button type="submit" class="search-icon">
        <i class="bi bi-search"></i>
      </button>
    </form>
    <nav class="desktop-nav">
      <a href="productspage.html">
        <i class="bi bi-grid"></i> Products Page
      </a>
      <a href="aboutpage.html">
        <i class="bi bi-people"></i> About Page
      </a>
      <a href="cartpage.html">
        <i class="bi bi-cart"></i> Cart
      </a>
    </nav>
    <nav class="mobile-nav">
      <button type="button" id="mobile-search-btn">
        <i class="bi bi-search"></i>
      </button>
      <a href="productspage.html">
        <i class="bi bi-grid"></i>
      </a>
      <a href="aboutpage.html">
        <i class="bi bi-people"></i>
      </a>
      <a href="cartpage.html">
        <i class="bi bi-cart"></i>
      </a>
    </nav>
  </header>
  <!--Centered-->
  <section class="cart-page">
    <h1>Showing current items...</h1>
    <p id="cart-count">Total items added</p>
    <!--Cart Container-->
    <div class="cart-container">
      <div class="cart-list" id="cart-list"> 
        <!--JavaScript will add stuff here-->
      </div>
      <!--Total price!!!-->
      <h4 id="cart-total">Total Price: ₱0</h4>
      <!--Clear function-->
      <button id="clear-cart-btn">
        Clear Cart
      </button>
      <!--Don't touch this!!!!-->
      <button id="checkout-btn">
        Checkout (No Functionality!)
      </button>
    </div>
  </section>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="script.js"></script>

</body>
</html>
