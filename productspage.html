<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <title>WonderTree | Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>
    <!--Logo, Search bar, and Redirect-->
    <header class="navbar">
      <a href="index.html">
        <img src="images/placeholder file.gif" width="50px" alt="WonderTree Logo">
      </a>
      <!--Search container, Div contains submission icon. CSS Magnifying Icon-->
      <form class="search-container">
        <input type="search" class="search-bar" id=search-input placeholder="Search products...">
        <button type="submit" class="search-icon">🔍</button>
      </form>
      <nav>
        <a href="productspage.html">Products Page</a>
        <a href="aboutpage.html">About Page</a>
        <a href="cartpage.html">🛒</a>
      </nav>
    </header>

    <!--CSS container for horizontal alignment-->
    <main class="productspage-layout">
        <!--Sidebar for filter-->
        <aside class="filter-selection">
            <!--Product filter selection-->
            <fieldset>
                <legend>GENERAL</legend>
                <label>
                    <input type="checkbox" value="collar">Collars
                </label>
                <label>
                    <input type="checkbox" value="cage">Cage
                </label>
                <label>
                    <input type="checkbox" value="food">Food
                </label>
                <label>
                    <input type="checkbox" value="saddle_harness">Saddle & Harness
                </label>
                <label>
                    <input type="checkbox" value="toys">Toys
                </label>
                <label>
                    <input type="checkbox" value="deco">Decorations
                </label>
            </fieldset> 

        <!--Animal filter selection-->
            <fieldset>
                <legend>PETS</legend>
                <label>
                    <input type="checkbox" value="dog">Dog
                </label>
                <label>
                    <input type="checkbox" value="cat">Cat
                </label>
                <label>
                    <input type="checkbox" value="parrot">Parrot
                </label>
                <label>
                    <input type="checkbox" value="fish">Fish
                </label>
            </fieldset>
        </aside>

        <!--Product Details Area-->
        <section class="product-section">
            <!--Javascript will target header and p for dynamic search results-->
            <h2 id="search-results">Displaying products</h2>
            <p id="result-count"></p>
            <!--JavaScript will target this for dynamic product input-->
            <div class="product-grid" id="product-grid">
                
            </div>
        </section>
    </main>

    <!--Forms and Copyright-->
    <footer>
      <!--Company Details-->
      <h6>WonderTree Co. 2026 All Rights Reserved.</h6>
      <p>123 ABC st. Quezon City, Philippines</p>
      <p>WonderTreeCo@co.ph | 1234567890</p>
    </footer>


    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="script.js"></script>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
